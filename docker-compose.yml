version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight-backend
    environment:
      TZ: Asia/Bahrain
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:h2:mem:finsight;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SPRING_SQL_INIT_MODE: always
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET:-finsight-secret-key-change-in-production-minimum-256-bits-required}
    expose:
      - "8389"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8389/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - finsight-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsight-frontend
    environment:
      TZ: Asia/Bahrain
    ports:
      - "5733:5733"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finsight-network
    restart: unless-stopped

networks:
  finsight-network:
    driver: bridge
